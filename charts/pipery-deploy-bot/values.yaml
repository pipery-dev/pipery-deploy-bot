replicaCount: 1

image:
  repository: ghcr.io/pipery-dev/deploy-bot
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
hostAliases: []

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: deploy-bot.pipery.dev
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

apiToken:
  existingSecret: pipery-deploy-bot-api
  secretKey: api-token
  value: ""

dex:
  enabled: true
  issuer: https://auth.pipery.dev/dex
  clientId: pipery-deploy-bot

database:
  existingSecret: pipery-deploy-bot-database
  secretKey: database-url
  url: ""

config:
  existingConfigMap: ""
  secretKey: config.json
  data:
    installations:
      default:
        app_id: 12345
        installation_id: 67890
        private_key_file: /etc/pipery/private-key/github-app.pem

privateKey:
  existingSecret: pipery-deploy-bot-private-key
  secretKey: github-app.pem
  value: ""

scheduler:
  interval: 30s

migrations:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  backoffLimit: 3

probes:
  liveness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 20
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
