{{- if not .Values.config.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pipery-deploy-bot.configSecretName" . }}
  labels:
    {{- include "pipery-deploy-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.config.secretKey }}: |
    {{- toPrettyJson .Values.config.data | nindent 4 }}
{{- end }}
{{- if and (not .Values.privateKey.existingSecret) .Values.privateKey.value }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pipery-deploy-bot.privateKeySecretName" . }}
  labels:
    {{- include "pipery-deploy-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.privateKey.secretKey }}: |
    {{- .Values.privateKey.value | nindent 4 }}
{{- end }}
{{- if and (not .Values.apiToken.existingSecret) .Values.apiToken.value }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pipery-deploy-bot.apiTokenSecretName" . }}
  labels:
    {{- include "pipery-deploy-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.apiToken.secretKey }}: {{ .Values.apiToken.value | quote }}
{{- end }}
{{- if and (not .Values.database.existingSecret) .Values.database.url }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pipery-deploy-bot.databaseSecretName" . }}
  labels:
    {{- include "pipery-deploy-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.database.secretKey }}: {{ .Values.database.url | quote }}
{{- end }}
